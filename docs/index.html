<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>International Briefings</title>
<style>
:root {
  --bg: #fdf6e3;
  --text: #1a1a1a;
  --accent: #c0392b;
  --muted: #666;
  --border: #d4c5a9;
  --card-bg: #fff;
  --link: #2c5282;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a;
    --text: #e0d6c8;
    --accent: #e74c3c;
    --muted: #999;
    --border: #333;
    --card-bg: #242424;
    --link: #63b3ed;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Georgia, 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  padding: 1rem;
  max-width: 42rem;
  margin: 0 auto;
}
h1 {
  font-size: 1.6rem;
  border-bottom: 3px solid var(--accent);
  padding-bottom: 0.4rem;
  margin-bottom: 0.5rem;
}
h2 {
  font-size: 1.2rem;
  color: var(--accent);
  margin-top: 1.8rem;
  margin-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.2rem;
}
p { margin-bottom: 1rem; }
p.date { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
ul { margin: 0.5rem 0 1rem 1.2rem; }
li { margin-bottom: 0.5rem; }
hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
.cite { color: var(--accent); font-size: 0.8em; font-family: sans-serif; }
.nav { font-family: sans-serif; font-size: 0.85rem; margin-bottom: 1.5rem; }
.nav a { margin-right: 1rem; }
.country-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
  margin-top: 1rem;
}
.country-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem 1.2rem;
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.2s;
}
.country-card:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.country-card h3 {
  font-size: 1.1rem;
  margin-bottom: 0.3rem;
}
.country-card .meta {
  font-family: sans-serif;
  font-size: 0.8rem;
  color: var(--muted);
}
.empty { color: var(--muted); font-style: italic; margin-top: 2rem; }
</style>
</head>
<body>
<div class="nav"><strong>i18n News</strong></div>
<h1>International Briefings</h1>
<p class="date">Economist-style country reports, free of US-centric content</p>
<h2>2026-03-10</h2>
<div class="country-grid">
<a class="country-card" href="2026_03_10/finland/index.html">
  <h3>Finland</h3>
  <div class="meta">2026-03-10</div>
</a>
<a class="country-card" href="2026_03_10/japan/index.html">
  <h3>Japan</h3>
  <div class="meta">2026-03-10</div>
</a>
</div>

</body>
</html>
